name: Publish Packages to npm

on:
  push:
    branches:
      - master  # 如果您的預設分支是 main，請改為 main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 只需要讀取權限
      id-token: write  # 取得 OIDC 憑證所必需的權限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 使用 Node.js 22 版本

      - name: Upgrade npm & Install global tools
        run: |
          npm install -g npm@latest
          npm install -g @babel/cli@7 @babel/core@7 terser yarn

      - name: Install dependencies for packages
        run: |
          for dir in configerer utiller databazer linepayer gener_all; do
            if [ -d "$dir" ]; then
              echo "Installing dependencies in $dir..."
              cd $dir && npm install && cd ..
            fi
          done

      - name: Inject local modified utiller code into node_modules
        run: |
          npx babel utiller/src/utiller/nodeutiller.js --out-file gener_all/node_modules/utiller/lib/utiller/nodeutiller.js --config-file ./utiller/babel.config.js

      - name: Debug configerer installation
        run: |
          echo "=== configerer folder content ==="
          ls -la gener_all/node_modules/configerer || true
          echo "=== configerer package.json ==="
          cat gener_all/node_modules/configerer/package.json || true
          echo "=== node_modules link status ==="
          ls -la gener_all/node_modules | grep -E "configerer|utiller" || true

      - name: Build and Publish
        run: |
          cd gener_all
          node -r @babel/register src/index.js
