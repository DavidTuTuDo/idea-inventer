name: Publish Packages to npm

on:
  push:
    branches:
      - master  # 如果您的預設分支是 main，請改為 main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要寫入權限來推播偵錯日誌
      id-token: write  # 取得 OIDC 憑證所必需的權限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 使用 Node.js 22 版本

      - name: Upgrade npm & Install global tools
        run: |
          npm install -g npm@latest
          npm install -g @babel/cli@7 @babel/core@7 terser yarn

      - name: Install dependencies for packages
        run: |
          for dir in configerer utiller databazer linepayer; do
            if [ -d "$dir" ]; then
              echo "Installing dependencies in $dir..."
              cd $dir && npm install && cd ..
            fi
          done

          # Temporarily rename sibling packages to prevent npm from automatically linking them as symlinks
          mv configerer configerer_backup
          mv utiller utiller_backup
          echo "Installing dependencies in gener_all..."
          cd gener_all && npm install && cd ..
          mv configerer_backup configerer
          mv utiller_backup utiller

      - name: Inject local modified utiller code into node_modules
        run: |
          npx babel utiller/src/utiller/nodeutiller.js --out-file gener_all/node_modules/utiller/lib/utiller/nodeutiller.js --config-file ./utiller/babel.config.js
      - name: Generate Debug Logs
        if: always()
        run: |
          echo "=== configerer folder content ===" > debug_log.txt
          ls -la gener_all/node_modules/configerer >> debug_log.txt 2>&1 || true
          echo "=== configerer package.json ===" >> debug_log.txt
          cat gener_all/node_modules/configerer/package.json >> debug_log.txt 2>&1 || true
          echo "=== node_modules link status ===" >> debug_log.txt
          ls -la gener_all/node_modules | grep -E "configerer|utiller" >> debug_log.txt 2>&1 || true
          echo "=== npm list ===" >> debug_log.txt
          npm list --prefix gener_all >> debug_log.txt 2>&1 || true
          echo "=== workspace package.json versions ===" >> debug_log.txt
          for dir in configerer utiller databazer linepayer gener_all; do
            if [ -f "$dir/package.json" ]; then
              echo "$dir version:" >> debug_log.txt
              grep '"version"' $dir/package.json >> debug_log.txt || true
            fi
          done

      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: debug_log.txt

      - name: Build and Publish
        run: |
          cd gener_all
          node -r @babel/register src/index.js
